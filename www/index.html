<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="format-detection" content="telephone=no">
    <title>Project Tracker</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◈</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Loading Screen -->
<div id="loading" class="loading-screen">
    <div class="spinner"></div>
    <p>로딩 중...</p>
</div>

<!-- App -->
<div id="app" class="hidden">

    <!-- ==================== DASHBOARD ==================== -->
    <div id="dashboard-page" class="page">
        <header class="app-header">
            <h1 class="app-title">
                <span class="title-icon">◈</span> Project Tracker
            </h1>
            <div style="display:flex;gap:8px;align-items:center">
                <button id="add-project-btn" class="btn btn-primary">+ 새 프로젝트</button>
                <!-- 익명: 이메일 연동 버튼 / 이메일 유저: 로그아웃 버튼 -->
                <button id="auth-action-btn" class="btn btn-ghost btn-sm"></button>
            </div>
        </header>
        <!-- 현재 사용자 상태 표시 바 -->
        <div id="user-info-bar" class="user-info-bar"></div>
        <main class="container">
            <div id="projects-grid" class="projects-grid"></div>
            <div id="empty-state" class="empty-state hidden">
                <div class="empty-icon">📂</div>
                <p class="empty-title">프로젝트가 없습니다</p>
                <p class="empty-sub">위의 버튼으로 첫 프로젝트를 추가해보세요</p>
            </div>
        </main>
    </div>

    <!-- ==================== PROJECT DETAIL ==================== -->
    <div id="project-page" class="page hidden">
        <header class="app-header">
            <div class="header-start">
                <button id="back-btn" class="btn btn-ghost">← 목록</button>
                <div class="project-title-group">
                    <h2 id="project-name-title" class="project-title"></h2>
                    <button id="edit-name-btn" class="btn-icon-text" title="이름 편집">✏</button>
                </div>
            </div>
            <button id="delete-project-btn" class="btn btn-danger-ghost">삭제</button>
        </header>

        <nav class="tab-nav">
            <button class="tab-btn active" data-tab="status">진행 상태</button>
            <button class="tab-btn" data-tab="updates">업데이트 로그</button>
            <button class="tab-btn" data-tab="improvements">보완 사항</button>
            <button class="tab-btn" data-tab="memos">메모</button>
        </nav>

        <main class="container tab-container">

            <!-- Status Tab -->
            <div id="tab-status" class="tab-panel">
                <div class="panel-header">
                    <h3 class="panel-title">진행 상태</h3>
                    <button id="edit-status-options-btn" class="btn btn-sm btn-outline">상태 편집</button>
                </div>
                <div id="status-options-grid" class="status-options-grid"></div>
            </div>

            <!-- Updates Tab -->
            <div id="tab-updates" class="tab-panel hidden">
                <div class="panel-header">
                    <h3 class="panel-title">업데이트 로그</h3>
                    <button id="new-update-btn" class="btn btn-sm btn-primary">+ 새 업데이트</button>
                </div>
                <div id="current-update-section"></div>
                <div class="accordion-section">
                    <button id="toggle-history-btn" class="accordion-trigger">
                        <span>이전 업데이트 기록</span>
                        <span class="accordion-chevron">▼</span>
                    </button>
                    <div id="updates-history" class="accordion-body hidden"></div>
                </div>
            </div>

            <!-- Improvements Tab -->
            <div id="tab-improvements" class="tab-panel hidden">
                <div class="panel-header">
                    <h3 class="panel-title">보완 사항</h3>
                </div>
                <div id="improvements-list"></div>
            </div>

            <!-- Memos Tab -->
            <div id="tab-memos" class="tab-panel hidden">
                <div class="panel-header">
                    <h3 class="panel-title">메모</h3>
                    <button id="add-memo-btn" class="btn btn-sm btn-primary">+ 추가</button>
                </div>
                <div id="memos-list"></div>
            </div>

        </main>
    </div>

</div>

<!-- Modal -->
<div id="modal-backdrop" class="modal-backdrop hidden">
    <div id="modal-box" class="modal-box" role="dialog" aria-modal="true">
        <div class="modal-header">
            <h3 id="modal-title" class="modal-title-text"></h3>
            <button id="modal-close-btn" class="btn-icon-close" aria-label="닫기">×</button>
        </div>
        <div id="modal-body" class="modal-body"></div>
        <div id="modal-footer" class="modal-footer"></div>
    </div>
</div>

<!-- Toast Container -->
<div id="toast-container" class="toast-container"></div>

<!-- Firebase Compat SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="app.js"></script>
</body>
</html>
